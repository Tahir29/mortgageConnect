<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060e1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1e3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C27D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.07" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Glow orbs -->
  <rect width="1200" height="630" fill="url(#glow1)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Gold top border line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldGrad)" />

  <!-- Gold bottom border line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#goldGrad)" />

  <!-- ── Diamond Logo Mark — centered left area ── -->
  <!-- Outer diamond border -->
  <g transform="translate(200, 315)">
    <!-- Outer rotated square (diamond) -->
    <rect x="-52" y="-52" width="104" height="104" rx="8"
          fill="none" stroke="url(#goldGrad)" stroke-width="3"
          transform="rotate(45)" />
    <!-- Inner filled rotated square -->
    <rect x="-34" y="-34" width="68" height="68" rx="5"
          fill="url(#goldGrad)" opacity="0.85"
          transform="rotate(45)" />
    <!-- MC text -->
    <text x="0" y="8" text-anchor="middle"
          font-family="Georgia, serif" font-weight="700"
          font-size="28" fill="#0A1628" letter-spacing="1">MC</text>
  </g>

  <!-- ── Wordmark ── -->
  <!-- Mortgage -->
  <text x="310" y="290"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="600" font-size="72"
        fill="#FFFFFF" letter-spacing="2">Mortgage</text>

  <!-- Connect -->
  <text x="316" y="352"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="600" font-size="40"
        fill="url(#goldGrad)" letter-spacing="14">CONNECT</text>

  <!-- Divider line -->
  <rect x="310" y="372" width="60" height="2" rx="1" fill="url(#goldGrad)" />

  <!-- Tagline -->
  <text x="310" y="410"
        font-family="Arial, sans-serif"
        font-weight="400" font-size="20"
        fill="#FFFFFF" opacity="0.5" letter-spacing="1">
    UAE&apos;s Premier Mortgage Platform
  </text>

  <!-- ── Right side — trust badges ── -->
  <!-- Vertical divider -->
  <rect x="730" y="180" width="1" height="340" fill="#C9A84C" opacity="0.2" />

  <!-- Badge 1 -->
  <text x="850" y="248" text-anchor="middle"
        font-family="Georgia, serif" font-weight="700" font-size="48"
        fill="url(#goldGrad)">5+</text>
  <text x="850" y="278" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="16"
        fill="#FFFFFF" opacity="0.5" letter-spacing="2">VERIFIED AGENTS</text>

  <!-- Horizontal rule -->
  <rect x="800" y="300" width="100" height="1" fill="#C9A84C" opacity="0.2" />

  <!-- Badge 2 -->
  <text x="850" y="348" text-anchor="middle"
        font-family="Georgia, serif" font-weight="700" font-size="48"
        fill="url(#goldGrad)">7</text>
  <text x="850" y="378" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="16"
        fill="#FFFFFF" opacity="0.5" letter-spacing="2">EMIRATES</text>

  <!-- Horizontal rule -->
  <rect x="800" y="400" width="100" height="1" fill="#C9A84C" opacity="0.2" />

  <!-- Badge 3 -->
  <text x="850" y="448" text-anchor="middle"
        font-family="Georgia, serif" font-weight="700" font-size="48"
        fill="url(#goldGrad)">Free</text>
  <text x="850" y="478" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="16"
        fill="#FFFFFF" opacity="0.5" letter-spacing="2">ALWAYS</text>

  <!-- ── Bottom URL ── -->
  <text x="600" y="590" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="16"
        fill="#C9A84C" opacity="0.6" letter-spacing="3">mortgageconnect.ae</text>
</svg>
