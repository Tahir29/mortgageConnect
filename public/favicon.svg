<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C27D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Navy background circle -->
  <rect width="512" height="512" rx="96" fill="#0A1628" />

  <!-- Outer diamond border -->
  <rect x="106" y="106" width="300" height="300" rx="24"
        fill="none" stroke="url(#goldGrad)" stroke-width="16"
        transform="rotate(45 256 256)" />

  <!-- Inner diamond fill -->
  <rect x="146" y="146" width="220" height="220" rx="16"
        fill="url(#goldGrad)"
        transform="rotate(45 256 256)" />

  <!-- MC text -->
  <text x="256" y="290" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="130"
        fill="#0A1628" letter-spacing="4">MC</text>
</svg>
