<svg width="180" height="48" viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C27D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Diamond mark -->
  <g transform="translate(24, 24)">
    <!-- Outer diamond -->
    <rect x="-16" y="-16" width="32" height="32" rx="3"
          fill="none" stroke="url(#goldGrad)" stroke-width="2"
          transform="rotate(45)" />
    <!-- Inner fill -->
    <rect x="-10" y="-10" width="20" height="20" rx="2"
          fill="url(#goldGrad)"
          transform="rotate(45)" />
    <!-- MC initials -->
    <text x="0" y="4.5" text-anchor="middle"
          font-family="Georgia, serif" font-weight="700"
          font-size="11" fill="#0A1628" letter-spacing="0.5">MC</text>
  </g>

  <!-- Wordmark -->
  <text x="52" y="20"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="600" font-size="16" fill="#FFFFFF" letter-spacing="0.5">
    Mortgage
  </text>
  <text x="53" y="36"
        font-family="Arial, sans-serif"
        font-weight="600" font-size="10" fill="url(#goldGrad)" letter-spacing="3.5">
    CONNECT
  </text>
</svg>
